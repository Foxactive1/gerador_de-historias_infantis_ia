<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Gerador de Histórias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container py-4">

  <h2 class="mb-4">📊 Dashboard</h2>

  <!-- STATUS -->
  <div class="card bg-secondary mb-3">
    <div class="card-body">
      <h5>Plano: <span id="plan"></span></h5>
      <p>Uso hoje: <span id="usage"></span></p>
    </div>
  </div>

  <!-- GERAR -->
  <div class="card bg-secondary mb-3">
    <div class="card-body">
      <textarea id="prompt" class="form-control mb-2" placeholder="Digite a história..."></textarea>
      <button class="btn btn-success" onclick="gerar()">Gerar História</button>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div class="card bg-secondary">
    <div class="card-body">
      <h5>Histórico</h5>
      <ul id="historico" class="list-group"></ul>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
  'SEU_URL',
  'SEU_PUBLIC_KEY'
);

async function carregar() {
  const { data: { user } } = await supabase.auth.getUser();

  const { data: profile } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single();

  document.getElementById('plan').innerText = profile.plan;

  const { data: stories } = await supabase
    .from('stories')
    .select('*')
    .order('created_at', { ascending: false });

  const lista = document.getElementById('historico');
  lista.innerHTML = '';

  stories.forEach(s => {
    lista.innerHTML += `<li class="list-group-item">${s.story}</li>`;
  });
}

async function gerar() {
  const prompt = document.getElementById('prompt').value;

  const { data: { user } } = await supabase.auth.getUser();

  const res = await fetch('/api/generate-story', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      prompt,
      user_id: user.id
    })
  });

  const data = await res.json();
  alert(data.story);

  carregar();
}

carregar();
</script>

</body>
</html>
