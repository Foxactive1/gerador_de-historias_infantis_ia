<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Histórias Infantis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    align-items: center;
}

.card {
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.step { display: none; }
.step.active { display: block; }

.story-box {
    background: #fff3cd;
    border-radius: 15px;
    padding: 20px;
    line-height: 1.7;
}
</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card p-4">

<!-- STEP 0 -->
<div id="step0" class="step active">
<h4>Idade da criança</h4>
<input type="number" id="age" class="form-control mb-3" min="2" max="12">
<button class="btn btn-primary w-100" onclick="next(1)">Continuar</button>
</div>

<!-- STEP 1 -->
<div id="step1" class="step">
<h4>Gênero</h4>
<select id="gender" class="form-select mb-3">
<option value="">Selecione</option>
<option>menino</option>
<option>menina</option>
<option>outro</option>
</select>
<button class="btn btn-secondary" onclick="prev(0)">Voltar</button>
<button class="btn btn-primary float-end" onclick="next(2)">Continuar</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<h4>Interesses (até 3)</h4>
<div id="interests" class="mb-3"></div>
<button class="btn btn-secondary" onclick="prev(1)">Voltar</button>
<button class="btn btn-primary float-end" onclick="next(3)">Continuar</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<h4>Estilo</h4>
<select id="style" class="form-select mb-3">
<option value="">Selecione</option>
<option value="engraçado">Engraçado</option>
<option value="aventureiro">Aventureiro</option>
<option value="suave">Calmante</option>
<option value="mágico">Mágico</option>
<option value="educativo">Educativo</option>
</select>
<button class="btn btn-secondary" onclick="prev(2)">Voltar</button>
<button class="btn btn-primary float-end" onclick="next(4)">Continuar</button>
</div>

<!-- STEP 4 -->
<div id="step4" class="step">
<h4>Lição da história</h4>
<textarea id="lesson" class="form-control mb-3"></textarea>
<button class="btn btn-secondary" onclick="prev(3)">Voltar</button>
<button class="btn btn-success float-end" onclick="generate()">Gerar</button>
</div>

<!-- LOADING -->
<div id="loading" class="step text-center">
<div class="spinner-border"></div>
<p>Gerando história...</p>
</div>

<!-- RESULT -->
<div id="result" class="step">
<h4>📖 História</h4>
<div id="story" class="story-box mb-3"></div>
<button class="btn btn-primary w-100" onclick="reset()">Nova história</button>
</div>

</div>
</div>
</div>
</div>

<script>
const data = {
    age: '',
    gender: '',
    interests: [],
    style: '',
    lesson: ''
};

const options = [
    'Animais','Espaço','Dinossauros','Magia','Super-heróis','Oceano'
];

function init() {
    const container = document.getElementById('interests');
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-primary m-1';
        btn.innerText = opt;

        btn.onclick = () => toggleInterest(opt, btn);
        container.appendChild(btn);
    });
}

function toggleInterest(opt, btn) {
    const index = data.interests.indexOf(opt);

    if (index > -1) {
        data.interests.splice(index, 1);
        btn.classList.remove('active');
    } else {
        if (data.interests.length >= 3) {
            alert('Máximo 3 interesses');
            return;
        }
        data.interests.push(opt);
        btn.classList.add('active');
    }
}

function show(step) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(step).classList.add('active');
}

function next(step) {

    if (step === 1) {
        data.age = document.getElementById('age').value;
        if (!data.age) return alert('Informe a idade');
    }

    if (step === 2) {
        data.gender = document.getElementById('gender').value;
        if (!data.gender) return alert('Selecione o gênero');
    }

    if (step === 3 && data.interests.length === 0) {
        return alert('Escolha interesses');
    }

    if (step === 4) {
        data.style = document.getElementById('style').value;
        if (!data.style) return alert('Selecione estilo');
    }

    show('step' + step);
}

function prev(step) {
    show('step' + step);
}

async function generate() {

    data.lesson = document.getElementById('lesson').value;
    if (!data.lesson) return alert('Informe uma lição');

    show('loading');

    const prompt = `
Crie uma história infantil para uma criança de ${data.age} anos (${data.gender}),
interesses: ${data.interests.join(', ')},
estilo: ${data.style},
lição: ${data.lesson},
300-500 palavras, português do Brasil.
`;

    try {

        const res = await fetch('/api/generate-story', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });

        const json = await res.json();

        if (!res.ok) throw new Error(json.error);

        document.getElementById('story').innerHTML =
            json.story.replace(/\n/g, '<br><br>');

        show('result');

    } catch (err) {
        alert('Erro: ' + err.message);
        show('step4');
    }
}

function reset() {
    location.reload();
}

init();
</script>

</body>
</html>
