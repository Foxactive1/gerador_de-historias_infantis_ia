<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Histórias IA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height: 100vh;
    color: white;
}

.card {
    border-radius: 20px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-4">📖 Gerador de Histórias com IA</h2>

<!-- LOGIN -->
<div id="loginBox" class="text-center">
    <button class="btn btn-light" onclick="login()">
        🔐 Entrar com Google
    </button>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <strong id="userEmail"></strong><br>
            Plano: <span id="plan"></span>
        </div>

        <div>
            <button class="btn btn-warning btn-sm" onclick="upgrade()">
                Upgrade 🚀
            </button>
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Sair
            </button>
        </div>
    </div>

    <!-- USO -->
    <div class="alert alert-info">
        Uso hoje: <strong id="usage"></strong>
    </div>

    <!-- FORM -->
    <div class="card p-3 mb-3 bg-light text-dark">
        <input id="age" class="form-control mb-2" placeholder="Idade">
        <input id="interests" class="form-control mb-2" placeholder="Interesses (ex: animais, magia)">
        <input id="style" class="form-control mb-2" placeholder="Estilo (ex: mágico)">
        <textarea id="lesson" class="form-control mb-2" placeholder="Lição"></textarea>

        <button class="btn btn-success" onclick="generate()">
            Gerar História ✨
        </button>
    </div>

    <!-- RESULT -->
    <div id="result" class="card p-3 mb-3 bg-warning text-dark hidden"></div>

    <!-- HISTÓRICO -->
    <div class="card p-3 bg-dark">
        <h5>📚 Histórico</h5>
        <ul id="history" class="list-group"></ul>
    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
    'SEU_SUPABASE_URL',
    'SEU_PUBLIC_KEY'
);

// 🔐 LOGIN
async function login() {
    await supabase.auth.signInWithOAuth({ provider: 'google' });
}

// 🔓 LOGOUT
async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

// 🚀 UPGRADE
async function upgrade() {
    const { data: { user } } = await supabase.auth.getUser();

    const res = await fetch('/api/create-checkout', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            user_id: user.id,
            email: user.email
        })
    });

    const data = await res.json();
    window.location.href = data.url;
}

// 📊 CARREGAR DASHBOARD
async function loadApp() {
    const { data: { user } } = await supabase.auth.getUser();

    if (!user) return;

    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    document.getElementById('userEmail').innerText = user.email;

    const { data: profile } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .single();

    document.getElementById('plan').innerText = profile.plan;

    const today = new Date().toISOString().slice(0,10);

    const { data: usage } = await supabase
        .from('usage')
        .select('*')
        .eq('user_id', user.id)
        .eq('date', today)
        .single();

    document.getElementById('usage').innerText =
        usage ? usage.count : 0;

    loadHistory(user.id);
}

// 📚 HISTÓRICO
async function loadHistory(userId) {
    const { data } = await supabase
        .from('stories')
        .select('*')
        .eq('user_id', userId)
        .order('created_at', { ascending: false });

    const ul = document.getElementById('history');
    ul.innerHTML = '';

    data.forEach(s => {
        ul.innerHTML += `
            <li class="list-group-item">
                ${s.story.substring(0,120)}...
            </li>`;
    });
}

// ✨ GERAR HISTÓRIA
async function generate() {
    const { data: { user } } = await supabase.auth.getUser();

    const prompt = `
Criança de ${document.getElementById('age').value} anos,
Interesses: ${document.getElementById('interests').value},
Estilo: ${document.getElementById('style').value},
Lição: ${document.getElementById('lesson').value}
`;

    const res = await fetch('/api/generate-story', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            prompt,
            user_id: user.id
        })
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    const result = document.getElementById('result');
    result.classList.remove('hidden');
    result.innerHTML = data.story;

    loadApp();
}

// INIT
loadApp();
</script>

</body>
</html>
